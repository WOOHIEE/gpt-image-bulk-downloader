name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run audit
      - run: npm run cancel-smoke
      - run: npm run verify
      - run: npm run build
      - run: npm run package
